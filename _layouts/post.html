---
layout: default
---

<!--添加目录与ScrollSpy效果 <div id="toc"></div>-->
<style>
.hung-panel {
	height: 100%;
	width: 80%;
	float: right;
}
#toc {
	width: 20%;
}
.toc {
	width: 20%;
	position: fixed;
	text-align: right;
}
.toc a:hover {
	font-weight: 700;
	color:#111112;
	text-decoration: none;
}
.toc a {
	color:#909092;
}
</style>






<article>
	<div class="main-left">
		<div class="hung-panel">
			<nav id="toc" class="affix" data-spy="affix" data-toggle="toc">
			</nav>
		</div>
	</div>


	<div class="center">
		<h1 class="title">{{ page.title }}</h1>
		<time class="code">{{ page.date | date: '%B %-d, %Y' }}</time>
	</div>

	<div class="divider"></div>
	{% if page.music-id %}
		<iframe frameborder="no" border="0" marginwidth="0" marginheight="0" width="330" height="86" src="//music.163.com/outchain/player?type=2&auto=1&id={{ page.music-id }}&height=66"></iframe>
	{% endif %}
		{{ content }}
		
	<div>
			{% include comment.html %}<!-- Comments -->
	</div>
</article>

<div class="page-navigation code">
	{% if page.next.url %}
    <a class="next" href="{{ page.next.url | prepend: site.baseurl | prepend: site.url }}" title="NEXT: {{page.next.title}}">&lt;&lt;</a>
		<span> &middot; </span>
  {% endif %}
		<a class="home" href='{{ "/" | prepend: site.baseurl | prepend: site.url }}' title="Back to Index">INDEX</a>
  {% if page.previous.url %}
		<span> &middot; </span>
    <a class="prev" href="{{ page.previous.url | prepend: site.baseurl | prepend: site.url }}" title="PREV: {{page.previous.title}}">&gt;&gt;</a>
  {% endif %}
</div>

<!--图片放大功能 -->

<link rel="stylesheet" type="text/css" media="all"  href="https://cdn.bootcss.com/fancybox/3.5.7/jquery.fancybox.css">
<script src="https://cdn.bootcss.com/fancybox/3.5.7/jquery.fancybox.min.js"></script>
<script>
	$(document).ready(function() {
		$("p img").each(function() {
			var strA = "<a data-fancybox='images'  style='text-decoration: none;'  href='" + this.src + "'></a>";
			$(this).wrapAll(strA);
		});
	});
	$('[data-fancybox="gallery"]').fancybox({
		openEffect : 'elastic',
		closeEffect : 'elastic',
	});
</script>
<!--end图片放大功能 -->

<!--添加目录与ScrollSpy效果 -->
<script src="/assets/toc.js" type="text/javascript"></script>
<script type="text/javascript">
	$(document).ready(function() {
		$('#toc').toc();
	});
</script>

<script src="/assets/bootstrap-toc.js" type="text/javascript"></script>
<link rel="stylesheet" type="text/css" href="/assets/bootstrap-toc.min.css" />
<!--end添加目录与ScrollSpy效果 -->
